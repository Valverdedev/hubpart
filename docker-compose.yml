version: "3.9"

# ============================================================
# AutoPartsHub — Infraestrutura local de desenvolvimento
# ============================================================

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: autopartshub-postgres
    environment:
      POSTGRES_DB: autopartshub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autopartshub-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcional: pgAdmin para visualizar o banco
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: autopartshub-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@autopartshub.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools  # rodar com: docker compose --profile tools up -d

volumes:
  postgres_data:
  redis_data:
